<!DOCTYPE html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하림그룹 경조화환 통합 운영 시스템</title>
    <meta property="og:title" content="하림그룹 경조화환 통합 운영 시스템" />
    <meta property="og:description" content="하림그룹 임직원을 위한 경조화환 간편처리 시스템입니다" />
    <meta property="og:image" content="./img/cover.png" />

    <link rel="stylesheet" href="./css/colors_and_type.css" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div id="root"></div>

    <script src="./js/config.js"></script>
    <script src="./js/ai.js"></script>
    <script src="./js/icons.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/ribbon-guide.js"></script>
    <script src="./js/faq-data.js"></script>
    <script src="./js/site-info.js"></script>
    <script src="./js/app.js"></script>

    <!-- 개발용 자동 새로고침: localhost 미리보기에서만 동작. 파일 변경 감지 시 자동 reload -->
    <script>
      (function () {
        if (!/^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname)) return;
        var files = ["index.html", "css/app.css", "js/app.js", "js/data.js"];
        var sig = null;
        function hash(s) { var h = 0; for (var i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; } return h; }
        function poll() {
          Promise.all(files.map(function (f) {
            return fetch(f + "?_=" + Date.now(), { cache: "no-store" })
              .then(function (r) { return r.text(); })
              .then(function (t) { return t.length + ":" + hash(t); })
              .catch(function () { return "x"; });
          })).then(function (parts) {
            var cur = parts.join("|");
            if (sig === null) { sig = cur; return; }
            if (cur !== sig) { location.reload(); }
          });
        }
        setInterval(poll, 1200);
      })();
    </script>
  </body>
</html>
